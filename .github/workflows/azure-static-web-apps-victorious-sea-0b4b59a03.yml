name: Azure Static Web Apps CI/CD

# Deploys via the SWA CLI directly rather than the Azure/static-web-apps-deploy
# Docker-based action — that action pulls
# mcr.microsoft.com/appsvc/staticappsclient:stable which has been intermittently
# returning 403 from Microsoft Container Registry, breaking CI runs.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Azure Static Web Apps
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_SEA_0B4B59A03 }}
        run: |
          ENV_NAME="production"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ENV_NAME="pr-${{ github.event.pull_request.number }}"
          fi
          swa deploy ./dist \
            --env "$ENV_NAME" \
            --deployment-token "$SWA_TOKEN"
